<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapchastChi - EV Parts Direct from China</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00d9ff;
  --secondary: #ff006e;
  --accent: #8338ec;
  --success: #3dd68e;
  --warning: #ffb703;
  --danger: #ff006e;
  
  --bg-dark: #0f1419;
  --bg-light: #ffffff;
  --surface-1: #1a1f2e;
  --surface-2: #252d3d;
  --surface-3: #31394b;
  
  --text-primary: #ffffff;
  --text-secondary: #b0b3c1;
  --text-tertiary: #7a7e8f;
  
  --border: rgba(255, 255, 255, 0.1);
  --border-light: rgba(255, 255, 255, 0.05);
  
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;
  
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0033 100%);
  color: var(--text-primary);
  font-family: var(--font-body);
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(131, 56, 236, 0.08) 0%, transparent 50%),
              radial-gradient(circle at 40% 20%, rgba(255, 0, 110, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: gradientShift 15s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(20px, 20px); }
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(0deg, transparent 24%, rgba(0, 217, 255, 0.02) 25%, rgba(0, 217, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 217, 255, 0.02) 75%, rgba(0, 217, 255, 0.02) 76%, transparent 77%, transparent),
    linear-gradient(90deg, transparent 24%, rgba(0, 217, 255, 0.02) 25%, rgba(0, 217, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 217, 255, 0.02) 75%, rgba(0, 217, 255, 0.02) 76%, transparent 77%, transparent);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: -1;
}

.glass {
  background: rgba(26, 31, 46, 0.4);
  backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 20, 25, 0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light);
  padding: 16px 24px;
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 700;
  font-family: var(--font-display);
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
}

.lang-switcher {
  display: flex;
  gap: 6px;
  background: var(--surface-1);
  padding: 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.lang-btn {
  background: transparent;
  color: var(--text-secondary);
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.lang-btn:hover {
  background: rgba(0, 217, 255, 0.1);
  color: var(--primary);
}

.lang-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: var(--text-primary);
  box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
}

.hero {
  max-width: 1200px;
  margin: 60px auto 40px;
  padding: 0 24px;
  text-align: center;
  animation: fadeInUp 0.8s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero-eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 16px;
  font-family: var(--font-mono);
}

.hero-title {
  font-size: 48px;
  font-weight: 700;
  font-family: var(--font-display);
  line-height: 1.2;
  margin-bottom: 20px;
  letter-spacing: -2px;
}

.hero-subtitle {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 30px;
  line-height: 1.6;
}

.steps-bar {
  max-width: 1200px;
  margin: 40px auto 0;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.step-item {
  position: relative;
  padding: 20px 12px;
  border-radius: var(--radius-md);
  background: var(--surface-1);
  border: 2px solid var(--border);
  transition: all 0.3s ease;
  text-align: center;
}

.step-item.active {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.05);
}

.step-number {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 auto 8px;
  font-family: var(--font-display);
  box-shadow: 0 4px 12px rgba(0, 217, 255, 0.2);
}

.step-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}

.main-content {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 24px 80px;
}

.card {
  padding: 32px;
  margin-bottom: 24px;
  border-radius: var(--radius-md);
  background: rgba(26, 31, 46, 0.4);
  backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--border);
  animation: fadeInUp 0.6s ease-out;
}

.card-title {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-display);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.card-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.5;
}

.field {
  margin-bottom: 20px;
}

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: var(--font-mono);
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 12px 14px;
  transition: all 0.3s ease;
}

.field input::placeholder, .field textarea::placeholder {
  color: var(--text-tertiary);
}

.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.05);
  box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
}

.field textarea {
  resize: vertical;
  min-height: 100px;
  font-family: var(--font-body);
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: var(--font-display);
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: var(--text-primary);
  box-shadow: 0 6px 16px rgba(0, 217, 255, 0.25);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0, 217, 255, 0.35);
}

.btn-secondary {
  background: var(--surface-2);
  color: var(--text-primary);
  border: 1.5px solid var(--border);
}

.btn-secondary:hover:not(:disabled) {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.05);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

@media (max-width: 768px) {
  .grid-2 {
    grid-template-columns: 1fr;
  }
  .steps-bar {
    grid-template-columns: repeat(2, 1fr);
  }
}

.cat-card {
  padding: 14px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  gap: 12px;
  align-items: center;
}

.cat-card:hover {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.05);
  transform: translateY(-2px);
}

.cat-card.selected {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.1);
  box-shadow: 0 4px 12px rgba(0, 217, 255, 0.15);
}

.cat-icon {
  font-size: 28px;
  flex-shrink: 0;
}

.cat-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.cat-desc {
  font-size: 11px;
  color: var(--text-secondary);
}

.subparts-wrap {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.subparts-wrap.show {
  display: block;
}

.subparts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.sub-tag {
  padding: 10px 12px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  text-align: center;
  transition: all 0.2s ease;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sub-tag:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.sub-tag.selected {
  background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(131, 56, 236, 0.15));
  border-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}

.selected-list {
  padding: 12px;
  background: var(--surface-1);
  border-radius: 10px;
  border: 1px solid var(--border);
  min-height: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
  margin-bottom: 20px;
}

.selected-list.empty::after {
  content: attr(data-empty);
  color: var(--text-tertiary);
  font-size: 12px;
  width: 100%;
}

.part-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(131, 56, 236, 0.2));
  border: 1px solid var(--primary);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-primary);
  font-weight: 500;
}

.part-chip button {
  background: none;
  border: none;
  color: var(--primary);
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
}

.photo-upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(0, 217, 255, 0.02);
  position: relative;
}

.photo-upload-area:hover {
  border-color: var(--primary);
  background: rgba(0, 217, 255, 0.06);
}

.photo-upload-area.dragover {
  border-color: var(--secondary);
  background: rgba(255, 0, 110, 0.08);
}

.photo-upload-input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-icon {
  font-size: 40px;
  margin-bottom: 12px;
  display: block;
}

.upload-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.upload-hint {
  font-size: 12px;
  color: var(--text-secondary);
}

.photo-previews {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.photo-thumb-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  aspect-ratio: 1;
}

.photo-thumb {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: 1px solid var(--border);
}

.photo-thumb-del {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 20px;
  height: 20px;
  background: var(--danger);
  border: none;
  border-radius: 4px;
  color: white;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.2s ease;
}

.photo-thumb-wrap:hover .photo-thumb-del {
  opacity: 1;
}

.toggle-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.toggle-btn {
  padding: 8px 14px;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s ease;
  font-family: var(--font-body);
}

.toggle-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(0, 217, 255, 0.05);
}

.toggle-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: var(--text-primary);
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(0, 217, 255, 0.2);
}

.checkbox-wrap {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  background: rgba(255, 0, 110, 0.08);
  border: 1px solid rgba(255, 0, 110, 0.2);
  border-radius: 8px;
  margin-bottom: 12px;
}

.checkbox-wrap input {
  width: 16px;
  height: 16px;
  margin-top: 3px;
  cursor: pointer;
  accent-color: var(--primary);
  flex-shrink: 0;
}

.checkbox-wrap label {
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  line-height: 1.4;
}

footer {
  text-align: center;
  padding: 30px 24px;
  color: var(--text-secondary);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

footer a {
  color: var(--primary);
  text-decoration: none;
}

footer a:hover {
  color: var(--secondary);
}

.hidden { display: none; }
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: var(--text-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.vin-badge {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  font-family: var(--font-mono);
  padding: 4px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.vin-badge.ok {
  background: rgba(61, 214, 142, 0.2);
  color: var(--success);
}

.vin-badge.bad {
  background: rgba(255, 0, 110, 0.2);
  color: var(--danger);
}

.car-info {
  background: rgba(0, 217, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: none;
  margin-bottom: 20px;
}

.car-info.show { display: block; }

.vin-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  font-family: var(--font-mono);
}

.vin-hint.error-msg {
  color: var(--danger);
}

.field.error input {
  border-color: var(--danger);
  background: rgba(255, 0, 110, 0.05);
}

@media (max-width: 768px) {
  .hero-title {
    font-size: 32px;
  }
  .card {
    padding: 20px;
  }
  .steps-bar {
    gap: 8px;
  }
  .step-item {
    padding: 16px 8px;
  }
  .main-content {
    padding: 0 16px 60px;
  }
}

</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>ZapchastChi</span>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('uz')">UZB</button>
      <button class="lang-btn" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-eyebrow" data-i18n="eyebrow"></div>
  <h1 class="hero-title" data-i18n="heroTitle"></h1>
  <p class="hero-subtitle" data-i18n="subtitle"></p>
</section>

<div class="steps-bar">
  <div class="step-item active" id="step-ind-1">
    <div class="step-number">1</div>
    <div class="step-label" data-i18n="step1"></div>
  </div>
  <div class="step-item" id="step-ind-2">
    <div class="step-number">2</div>
    <div class="step-label" data-i18n="step2"></div>
  </div>
  <div class="step-item" id="step-ind-3">
    <div class="step-number">3</div>
    <div class="step-label" data-i18n="step3"></div>
  </div>
  <div class="step-item" id="step-ind-4">
    <div class="step-number">4</div>
    <div class="step-label" data-i18n="step4"></div>
  </div>
</div>

<div class="main-content">

  <!-- STEP 1: VIN -->
  <div class="card" id="step1">
    <h2 class="card-title" data-i18n="s1title"></h2>
    <p class="card-subtitle" data-i18n="s1sub"></p>
    
    <div class="field" style="position:relative;">
      <label class="field-label" data-i18n="vinLabel"></label>
      <input type="text" id="vinInput" class="field-input" maxlength="17" style="padding-right:60px;" placeholder="17VIN_CODE" oninput="onVinInput(this)">
      <div class="vin-badge" id="vinBadge" style="display:none;"></div>
      <div class="vin-hint" id="vinHint" data-i18n="vinHint"></div>
    </div>

    <div class="car-info" id="carInfo">
      <div class="grid-2">
        <div class="field">
          <label class="field-label" data-i18n="ciMake"></label>
          <input type="text" id="editMake" class="field-input" placeholder="">
        </div>
        <div class="field">
          <label class="field-label" data-i18n="ciYear"></label>
          <input type="number" id="editYear" class="field-input" min="2000" max="2030">
        </div>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="ciModel"></label>
        <input type="text" id="editModel" class="field-input" list="modelsList">
        <datalist id="modelsList"></datalist>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="ciTrim"></label>
        <input type="text" id="editTrim" class="field-input" placeholder="">
      </div>
    </div>

    <button class="btn btn-primary" id="btnStep1" onclick="goStep2()" disabled>
      <span>✓</span>
      <span data-i18n="confirm"></span>
    </button>
  </div>

  <!-- STEP 2: PARTS -->
  <div class="card hidden" id="step2">
    <h2 class="card-title" data-i18n="s2title"></h2>
    <p class="card-subtitle" data-i18n="s2sub"></p>

    <div class="field">
      <label class="field-label" data-i18n="subcatsLabel"></label>
      <div id="partsCats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;"></div>
      <div class="subparts-wrap" id="subpartsWrap">
        <div id="subpartsGrid" class="subparts-grid"></div>
      </div>
    </div>

  }
  
  if(!validateVin(v)){
    badge.style.display=''; 
    badge.className='vin-badge bad'; 
    badge.textContent='ERROR';
    hint.textContent = '✗ Invalid VIN format';
    btn.disabled=true;
    return;
  }
  
  badge.style.display=''; 
  badge.className='vin-badge'; 
  badge.textContent='...';
  hint.textContent = 'Looking up VIN...';
  setTimeout(() => lookupVin(v), 400);
}

async function lookupVin(vin){
  var badge = document.getElementById('vinBadge');
  var hint = document.getElementById('vinHint');
  var info = document.getElementById('carInfo');
  
  try {
    var base = 'https://api.auto.dev/vin/'+vin+'?apiKey='+AUTODEV_API_KEY;
    var res = await fetch(base);
    var d = await res.json();
    
    if(!d || d.errorCode) throw new Error('API failed');
    
    var make = d.make || (d.vehicle && d.vehicle.make) || '';
    var year = (d.vehicle && d.vehicle.year) || '';
    var model = '';
    
    document.getElementById('editMake').value = make;
    document.getElementById('editYear').value = year;
    document.getElementById('editModel').value = model;
    
    decodedCar = {make, model, year};
    
    badge.className='vin-badge ok';
    badge.textContent = make || 'OK';
    info.classList.add('show');
    checkCarFields();
    
  } catch(e) {
    console.log('VIN lookup failed, using local DB');
    var wmi = vin.substring(0,3).toUpperCase();
    var localMake = WMI_DB[wmi] || 'Unknown';
    var yearChar = vin[9].toUpperCase();
    var localYear = YEAR_MAP[yearChar] || '';
    
    document.getElementById('editMake').value = localMake;
    document.getElementById('editYear').value = localYear;
    document.getElementById('editModel').value = '';
    
    badge.className='vin-badge';
    badge.textContent = 'PARTIAL';
    hint.textContent = 'VIN partially decoded, please fill model manually';
    info.classList.add('show');
    checkCarFields();
  }
}

function checkCarFields(){
  var make = document.getElementById('editMake').value.trim();
  var year = document.getElementById('editYear').value.trim();
  var model = document.getElementById('editModel').value.trim();
  document.getElementById('btnStep1').disabled = !(make && year && model);
}

function goStep2(){
  if(!document.getElementById('btnStep1').disabled){
    orderVin = document.getElementById('vinInput').value;
    decodedCar = {
      make: document.getElementById('editMake').value,
      model: document.getElementById('editModel').value,
      year: document.getElementById('editYear').value
    };
    renderCats();
    updateSelectedList();
    setStep(2);
  }
}

function renderCats(){
  var cats = PARTS_DATA[currentLang] || PARTS_DATA.uz;
  var container = document.getElementById('partsCats');
  container.innerHTML='';
  cats.forEach(cat => {
    var div = document.createElement('div');
    div.className='cat-card'+(activeCatId===cat.id?' selected':'');
    div.innerHTML=`<div class="cat-icon">${cat.icon}</div><div><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div>`;
    div.onclick=() => toggleCat(cat.id);
    container.appendChild(div);
  });
  renderSubparts();
}

function toggleCat(id){
  activeCatId = (activeCatId===id) ? null : id;
  renderCats();
}

function renderSubparts(){
  var wrap = document.getElementById('subpartsWrap');
  var grid = document.getElementById('subpartsGrid');
  if(!activeCatId){ wrap.classList.remove('show'); return; }
  var cats = PARTS_DATA[currentLang] || PARTS_DATA.uz;
  var cat = cats.find(c => c.id===activeCatId);
  if(!cat){ wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  grid.innerHTML='';
  cat.subs.forEach(sub => {
    var key = cat.id+'::'+sub;
    var tag = document.createElement('div');
    tag.className='sub-tag'+(selectedParts[key]?' selected':'');
    tag.textContent=sub;
    tag.onclick=() => togglePart(key);
    grid.appendChild(tag);
  });
}

function togglePart(key){
  if(selectedParts[key]) delete selectedParts[key];
  else selectedParts[key]=true;
  renderCats();
  updateSelectedList();
  document.getElementById('btnStep2').disabled = Object.keys(selectedParts).length===0;
}

function updateSelectedList(){
  var list = document.getElementById('selectedList');
  list.innerHTML='';
  var keys = Object.keys(selectedParts);
  if(keys.length===0){ list.classList.add('empty'); return; }
  list.classList.remove('empty');
  keys.forEach(key => {
    var name = key.split('::')[1];
    var chip = document.createElement('div');
    chip.className='part-chip';
    var btn = document.createElement('button');
    btn.textContent='×';
    btn.onclick=() => togglePart(key);
    chip.appendChild(document.createTextNode(name+' '));
    chip.appendChild(btn);
    list.appendChild(chip);
  });
}

function goStep3(){
  if(Object.keys(selectedParts).length>0){
    setStep(3);
  }
}

function goStep1(){
  setStep(1);
}

function goStep2(){
  if(!document.getElementById('btnStep1').disabled){
    orderVin = document.getElementById('vinInput').value;
    decodedCar = {
      make: document.getElementById('editMake').value,
      model: document.getElementById('editModel').value,
      year: document.getElementById('editYear').value
    };
    renderCats();
    updateSelectedList();
    setStep(2);
  }
}

function setPref(type, val){
  prefs[type] = val;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function getPref(key){ return prefs[key] || ''; }

function validateContact(){
  var name = document.getElementById('nameInput').value.trim();
  var tg = document.getElementById('tgInput').value.trim();
  var phone = document.getElementById('phoneInput').value.trim();
  var city = document.getElementById('cityInput').value;
  var chk1 = document.getElementById('chk1').checked;
  var chk2 = document.getElementById('chk2').checked;
  document.getElementById('btnStep3').disabled = !(name && (tg||phone) && city && chk1 && chk2);
}

function handlePhotos(files){
  for(var i=0; i<files.length && uploadedPhotos.length<6; i++){
    var reader = new FileReader();
    reader.onload = (e => function(){
      uploadedPhotos.push({file: files[i], dataUrl: e.target.result});
      renderPreviews();
    })(reader);
    reader.readAsDataURL(files[i]);
  }
}

function handleDrop(e){
  e.preventDefault();
  e.target.classList.remove('dragover');
  handlePhotos(e.dataTransfer.files);
}

function renderPreviews(){
  var wrap = document.getElementById('photoPreviews');
  wrap.innerHTML='';
  uploadedPhotos.forEach((p, idx) => {
    var w = document.createElement('div');
    w.className='photo-thumb-wrap';
    var img = document.createElement('img');
    img.className='photo-thumb';
    img.src=p.dataUrl;
    var del = document.createElement('button');
    del.className='photo-thumb-del';
    del.innerHTML='×';
    del.onclick=() => { uploadedPhotos.splice(idx,1); renderPreviews(); };
    w.appendChild(img);
    w.appendChild(del);
    wrap.appendChild(w);
  });
  var count = document.getElementById('photoCount');
  if(uploadedPhotos.length<3){
    count.style.color='var(--danger)';
    count.textContent='⚠ Needs '+(3-uploadedPhotos.length)+' more photos';
  } else {
    count.style.color='var(--success)';
    count.textContent='✓ '+uploadedPhotos.length+' photos OK';
  }
}

async function submitOrder(){
  var btn = document.getElementById('btnStep3');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>...';
  
  var name = document.getElementById('nameInput').value.trim();
  var tg = document.getElementById('tgInput').value.trim();
  var phone = document.getElementById('phoneInput').value.trim();
  var city = document.getElementById('cityInput').value;
  var comment = document.getElementById('commentInput').value.trim();
  var location = document.getElementById('partLocationInput').value.trim();
  var orderId = 'ORD-'+Date.now().toString(36).toUpperCase();
  
  var carInfo = decodedCar ? [decodedCar.make,decodedCar.model,decodedCar.year].filter(Boolean).join(' ') : 'Unknown';
  var partLines = Object.keys(selectedParts).map(k => '  - '+k.split('::')[1]).join('\n');
  
  var message = 'NEW ORDER - '+orderId+'\n\nCar: '+carInfo+'\nVIN: '+orderVin+'\n\nParts:\n'+partLines+'\n\nQuality: '+getPref('quality')+'\nAlt Brand: '+getPref('alt')+'\n\nContact:\n  Name: '+name+'\n  Telegram: '+(tg||'-')+'\n  Phone: '+(phone||'-')+'\n  City: '+city+'\n\n'+comment;
  
  try {
    var res = await fetch('https://api.telegram.org/bot'+TELEGRAM_BOT_TOKEN+'/sendMessage', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: TELEGRAM_CHAT_ID, text: message})
    });
    var data = await res.json();
    if(!data.ok) throw new Error(data.description||'Telegram error');
    
    if(uploadedPhotos.length > 0) {
      var fd = new FormData();
      fd.append('chat_id', TELEGRAM_CHAT_ID);
      uploadedPhotos.slice(0,10).forEach((p, i) => {
        fd.append('photo_'+i, p.file);
      });
      fd.append('caption', 'Photos for '+orderId);
      await fetch('https://api.telegram.org/bot'+TELEGRAM_BOT_TOKEN+'/sendMediaGroup', {method:'POST', body: fd});
    }
    
    document.getElementById('orderIdBox').textContent = orderId;
    setStep(4);
    
  } catch(e) {
    btn.disabled=false;
    btn.innerHTML = t('submit');
    alert('Error: '+e.message);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  ['editMake','editYear','editModel','nameInput','tgInput','phoneInput','cityInput'].forEach(id => {
    var el = document.getElementById(id);
    if(el) el.addEventListener('input', () => {
      checkCarFields();
      validateContact();
    });
  });
  
  applyTranslations();
  document.getElementById('selectedList').setAttribute('data-empty', t('emptyParts')||'');
});

if(isTgApp){
  document.body.classList.add('tg-mode');
  if(tg.initDataUnsafe && tg.initDataUnsafe.user){
    var user = tg.initDataUnsafe.user;
    if(user.first_name) document.getElementById('nameInput').value = user.first_name+(user.last_name?' '+user.last_name:'');
    if(user.username) document.getElementById('tgInput').value = '@'+user.username;
  }
}

</script>
