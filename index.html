<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapchastChi - EV Parts Direct from China</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d9ff;
      --secondary: #ff006e;
      --accent: #8338ec;
      --success: #3dd68e;
      --warning: #ffb703;
      --danger: #ff4d6d;
      --bg-dark: #0f1419;
      --bg-gradient: linear-gradient(135deg, #0f1419 0%, #12072a 55%, #1e0d3e 100%);
      --surface-1: rgba(26, 31, 46, 0.72);
      --surface-2: rgba(37, 45, 61, 0.92);
      --surface-3: rgba(49, 57, 75, 0.98);
      --text-primary: #ffffff;
      --text-secondary: #b0b3c1;
      --text-tertiary: #7a7e8f;
      --border: rgba(255, 255, 255, 0.1);
      --border-light: rgba(255, 255, 255, 0.05);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      --radius-sm: 10px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --font-display: "Space Grotesk", sans-serif;
      --font-body: "Sora", sans-serif;
      --font-mono: "DM Mono", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 217, 255, 0.12) 0%, transparent 34%),
        radial-gradient(circle at 78% 72%, rgba(131, 56, 236, 0.16) 0%, transparent 36%),
        radial-gradient(circle at 40% 85%, rgba(255, 0, 110, 0.08) 0%, transparent 28%);
      animation: drift 16s ease-in-out infinite;
    }

    body::after {
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, 0.02) 75%, rgba(255, 255, 255, 0.02) 76%, transparent 77%, transparent);
      background-size: 60px 60px;
      opacity: 0.4;
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(18px, -12px, 0); }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(15, 20, 25, 0.78);
      border-bottom: 1px solid var(--border-light);
    }

    .header-content,
    .hero,
    .steps-bar,
    .main-content,
    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 12px 24px rgba(0, 217, 255, 0.22);
    }

    .logo-text {
      background: linear-gradient(135deg, var(--primary), #ffffff 60%, var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .lang-switcher {
      display: flex;
      gap: 6px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
    }

    .lang-btn,
    .btn,
    .toggle-btn,
    .chip-btn,
    .tag-btn {
      border: 0;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .lang-btn {
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font: 600 12px var(--font-mono);
      padding: 8px 12px;
      letter-spacing: 0.04em;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--text-primary);
      box-shadow: 0 8px 20px rgba(0, 217, 255, 0.2);
    }

    .hero {
      padding-top: 56px;
      padding-bottom: 20px;
      text-align: center;
      animation: reveal 0.8s ease;
    }

    .hero-eyebrow {
      font: 600 12px var(--font-mono);
      letter-spacing: 0.18em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero-title {
      font: 700 clamp(34px, 5vw, 56px)/1.1 var(--font-display);
      letter-spacing: -0.06em;
      margin-bottom: 18px;
    }

    .hero-subtitle {
      max-width: 700px;
      margin: 0 auto;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .steps-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 26px;
      margin-bottom: 28px;
    }

    .step-item,
    .card,
    .summary-box,
    .status-box {
      background: var(--surface-1);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .step-item {
      border-radius: var(--radius-md);
      padding: 18px 14px;
      text-align: center;
    }

    .step-item.active {
      border-color: rgba(0, 217, 255, 0.8);
      background: rgba(0, 217, 255, 0.08);
    }

    .step-item.done {
      border-color: rgba(61, 214, 142, 0.6);
    }

    .step-number {
      width: 38px;
      height: 38px;
      margin: 0 auto 8px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      font: 700 18px var(--font-display);
    }

    .step-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .main-content {
      padding-bottom: 80px;
    }

    .card {
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 24px;
      animation: reveal 0.5s ease;
    }

    .hidden {
      display: none !important;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .card-title {
      font: 700 28px var(--font-display);
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .card-subtitle {
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 14px;
      max-width: 760px;
    }

    .badge {
      font: 600 11px var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 8px 10px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }

    .field {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font: 600 11px var(--font-mono);
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field-row,
    .action-row,
    .summary-grid,
    .toolbar-row,
    .grid-2,
    .chips-row {
      display: grid;
      gap: 16px;
    }

    .grid-2,
    .summary-grid,
    .toolbar-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    input:not([type="checkbox"]):not([type="radio"]):not([type="file"]),
    select,
    textarea {
      width: 100%;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      padding: 13px 14px;
      font: 500 14px var(--font-body);
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    input:not([type="checkbox"]):not([type="radio"]):not([type="file"])::placeholder,
    textarea::placeholder {
      color: var(--text-tertiary);
    }

    input:not([type="checkbox"]):not([type="radio"]):not([type="file"]):focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0, 217, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .field-inline {
      position: relative;
    }

    .field-meta {
      margin-top: 7px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .field-meta.error {
      color: var(--danger);
    }

    .vin-badge {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      border-radius: 999px;
      padding: 5px 8px;
      font: 600 10px var(--font-mono);
      letter-spacing: 0.06em;
      background: rgba(255, 255, 255, 0.08);
      display: none;
    }

    .vin-badge.ok { color: var(--success); background: rgba(61, 214, 142, 0.18); }
    .vin-badge.warn { color: var(--warning); background: rgba(255, 183, 3, 0.18); }
    .vin-badge.bad { color: var(--danger); background: rgba(255, 77, 109, 0.16); }

    .car-info,
    .status-box,
    .summary-box,
    .draft-note {
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .car-info,
    .summary-box {
      background: rgba(0, 217, 255, 0.06);
      border: 1px solid rgba(0, 217, 255, 0.18);
    }

    .status-box {
      background: rgba(255, 183, 3, 0.08);
      border: 1px solid rgba(255, 183, 3, 0.22);
      color: #ffe5a6;
    }

    .draft-note {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(131, 56, 236, 0.12);
      border: 1px solid rgba(131, 56, 236, 0.22);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .runtime-note {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      background: rgba(255, 183, 3, 0.1);
      border: 1px solid rgba(255, 183, 3, 0.28);
      color: #ffe5a6;
      font-size: 13px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      padding: 13px 20px;
      font: 600 13px var(--font-display);
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--text-primary);
      box-shadow: 0 10px 24px rgba(0, 217, 255, 0.18);
    }

    .btn-secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .cats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .cat-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.22s ease;
    }

    .cat-card:hover,
    .cat-card.active {
      border-color: rgba(0, 217, 255, 0.7);
      transform: translateY(-2px);
      background: rgba(0, 217, 255, 0.08);
    }

    .cat-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 26px;
    }

    .cat-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cat-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .subparts-wrap {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .subparts-wrap.show {
      display: block;
    }

    .subparts-grid,
    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag-btn,
    .chip-btn {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag-btn {
      background: var(--surface-3);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .tag-btn.selected,
    .tag-btn:hover {
      color: var(--text-primary);
      border-color: rgba(0, 217, 255, 0.8);
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.18), rgba(131, 56, 236, 0.22));
    }

    .selected-panel {
      border-radius: 16px;
      padding: 16px;
      min-height: 64px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
    }

    .selected-panel.empty::after {
      content: attr(data-empty);
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .chip-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.18), rgba(131, 56, 236, 0.24));
      color: var(--text-primary);
      border: 1px solid rgba(0, 217, 255, 0.8);
    }

    .chip-remove {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.22);
      font-size: 12px;
    }

    .toggle-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toggle-btn {
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
    }

    .toggle-btn.active {
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: rgba(0, 217, 255, 0.75);
      box-shadow: 0 8px 18px rgba(0, 217, 255, 0.18);
    }

    .photo-upload-area {
      position: relative;
      padding: 30px 20px;
      border-radius: 18px;
      border: 2px dashed rgba(255, 255, 255, 0.15);
      text-align: center;
      background: rgba(0, 217, 255, 0.04);
      transition: all 0.2s ease;
    }

    .photo-upload-area.dragover {
      border-color: var(--secondary);
      background: rgba(255, 0, 110, 0.08);
    }

    .photo-upload-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .upload-text {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .upload-hint {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .photo-previews {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .photo-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--surface-2);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-del {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 0;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      cursor: pointer;
    }

    .checkbox-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .checkbox-wrap.warn {
      background: rgba(255, 0, 110, 0.08);
      border-color: rgba(255, 0, 110, 0.22);
    }

    .checkbox-wrap input {
      accent-color: var(--primary);
      width: 18px;
      height: 18px;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .checkbox-wrap label {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .summary-box h3 {
      font: 700 16px var(--font-display);
      margin-bottom: 14px;
    }

    .summary-list {
      display: grid;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .summary-list strong {
      color: var(--text-primary);
    }

    .mono {
      font-family: var(--font-mono);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      padding-top: 16px;
      padding-bottom: 30px;
      color: var(--text-secondary);
      font-size: 12px;
      text-align: center;
      border-top: 1px solid var(--border-light);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .steps-bar,
      .grid-2,
      .summary-grid,
      .toolbar-row {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px;
      }

      .header-content,
      .hero,
      .steps-bar,
      .main-content,
      footer {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">ZapchastChi</div>
      </div>
      <div class="lang-switcher">
        <button class="lang-btn active" type="button" data-lang="uz">UZB</button>
        <button class="lang-btn" type="button" data-lang="ru">РУС</button>
        <button class="lang-btn" type="button" data-lang="zh">中文</button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-eyebrow" data-i18n="eyebrow"></div>
    <h1 class="hero-title" data-i18n="heroTitle"></h1>
    <p class="hero-subtitle" data-i18n="subtitle"></p>
  </section>

  <div class="steps-bar">
    <div class="step-item active" id="step-ind-1">
      <div class="step-number">1</div>
      <div class="step-label" data-i18n="step1"></div>
    </div>
    <div class="step-item" id="step-ind-2">
      <div class="step-number">2</div>
      <div class="step-label" data-i18n="step2"></div>
    </div>
    <div class="step-item" id="step-ind-3">
      <div class="step-number">3</div>
      <div class="step-label" data-i18n="step3"></div>
    </div>
    <div class="step-item" id="step-ind-4">
      <div class="step-number">4</div>
      <div class="step-label" data-i18n="step4"></div>
    </div>
  </div>

  <main class="main-content">
    <section class="draft-note hidden" id="draftNote">
      <span data-i18n="draftLoaded"></span>
      <button class="btn btn-ghost" type="button" id="clearDraftBtn" data-i18n="clearDraft"></button>
    </section>

    <section class="runtime-note hidden" id="runtimeNote">
      <span data-i18n="runtimeNote"></span>
    </section>

    <section class="card" id="step1">
      <div class="card-head">
        <div>
          <h2 class="card-title" data-i18n="s1title"></h2>
          <p class="card-subtitle" data-i18n="s1sub"></p>
        </div>
        <div class="badge mono">VIN</div>
      </div>

      <div class="field">
        <label class="field-label" for="vinInput" data-i18n="vinLabel"></label>
        <div class="field-inline">
          <input id="vinInput" type="text" maxlength="17" placeholder="17VINCODE..." autocomplete="off">
          <div class="vin-badge" id="vinBadge"></div>
        </div>
        <div class="field-meta" id="vinHint" data-i18n="vinHint"></div>

      state.currentStep = step;
      for (var i = 1; i <= 4; i += 1) {
        byId("step" + i).classList.toggle("hidden", i !== step);
        var indicator = byId("step-ind-" + i);
        indicator.classList.toggle("active", i === step);
        indicator.classList.toggle("done", i < step);
      }
      renderOrderSummary();
      window.scrollTo({ top: 0, behavior: "smooth" });

    function validateVin(vin) {
      return /^[A-HJ-NPR-Z0-9]{17}$/i.test(vin);
    }

    function setVinBadge(mode, text) {
      var badge = byId("vinBadge");
      badge.className = "vin-badge " + mode;
      badge.textContent = text;
      badge.style.display = text ? "inline-block" : "none";
    }

    function setVinStatus(message, visible) {
      var status = byId("vinStatus");
      status.textContent = message || "";
      status.classList.toggle("hidden", !visible);
    }

    function onVinInput(event) {
      var cleaned = event.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "").replace(/[IOQ]/g, "");
      event.target.value = cleaned;
      state.orderVin = cleaned;
      setVinStatus("", false);

      if (cleaned.length === 0) {
        setVinBadge("", "");
        byId("carInfo").classList.add("hidden");
        refreshAllValidity();
        saveDraft();
        return;
      }

      if (cleaned.length < 17) {
        setVinBadge("", "");
        byId("vinHint").textContent = t("vinHint");
        byId("carInfo").classList.add("hidden");
        refreshAllValidity();
        saveDraft();
        return;
      }

      if (!validateVin(cleaned)) {
        setVinBadge("bad", "ERROR");
        byId("vinHint").textContent = t("vinInvalid");
        byId("carInfo").classList.add("hidden");
        refreshAllValidity();
        saveDraft();
        return;
      }

      var lookupId = ++state.lastVinLookupId;
      setVinBadge("warn", "...");
      byId("vinHint").textContent = t("vinLookup");
      lookupVin(cleaned, lookupId);
      saveDraft();
    }

    async function fetchVinProxy(vin) {
      var response = await fetch(VIN_PROXY_ENDPOINT + "?vin=" + encodeURIComponent(vin), {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      });
      var payload = await response.json().catch(function () { return {}; });
      if (!response.ok || !payload.ok) {
        throw new Error((payload && (payload.details || payload.error)) || ("VIN proxy failed: " + response.status));
      }
      return payload;
    }

    async function lookupVin(vin, lookupId) {
      var localData = decodeVinLocally(vin);
      var remoteData = null;
      var remoteWorked = false;
      var remotePartial = false;

      try {
        var proxyPayload = await fetchVinProxy(vin);
        remoteData = normalizeProxyVehicle(proxyPayload.vehicle);
        remoteWorked = !!(remoteData.make || remoteData.model || remoteData.year);
        remotePartial = remoteWorked && !(remoteData.make && remoteData.model);
      } catch (error) {
        console.warn("VIN API lookup failed, falling back to local decode.", error);
        remoteWorked = false;
      }

      if (lookupId !== state.lastVinLookupId) {
        return;
      }

      var data = remoteWorked ? mergeVinData(localData, remoteData) : localData;
      if (remotePartial) {
        data.year = "";
      }
      state.decodedCar = {
        make: data.make || "",
        model: data.model || "",
        year: data.year || "",
        trim: data.trim || ""
      };
      fillCarForm(state.decodedCar);
      updateModelSuggestions(state.decodedCar.make);
      byId("carInfo").classList.remove("hidden");

      if (remoteWorked && data.model) {
        setVinBadge("ok", data.make || "OK");
        byId("vinHint").textContent = t("vinOk");
      } else if (remoteWorked) {
        setVinBadge("warn", data.make ? "PARTIAL" : "LOCAL");
        byId("vinHint").textContent = t("vinPartial");
        setVinStatus(t("vinPartialStatus"), true);
      } else {
        setVinBadge("warn", data.make ? "PARTIAL" : "LOCAL");
        byId("vinHint").textContent = t("vinPartial");
        setVinStatus(t("vinNetworkFail"), true);
      }

      refreshAllValidity();
      saveDraft();
    }

    function decodeVinLocally(vin) {
      var wmi = vin.slice(0, 3).toUpperCase();
      var yearChar = vin.charAt(9).toUpperCase();
      var make = WMI_DB[wmi] || "";
      var year = YEAR_MAP[yearChar] || "";
      return { make: make, model: "", year: year, trim: "" };
    }

    function normalizeProxyVehicle(data) {
      if (!data) {
        return {};
      }
      return {
        make: data.make || "",
        model: data.model || "",
        year: data.year || "",
        trim: data.trim || ""
      };
    }

    function mergeVinData(localData, remoteData) {
      return {
        make: remoteData.make || localData.make,
        model: remoteData.model || localData.model,
        year: remoteData.year || localData.year,
        trim: remoteData.trim || localData.trim
      };
    }

    function fillCarForm(car) {
      byId("editMake").value = car.make || "";
      byId("editYear").value = car.year || "";
      byId("editModel").value = car.model || "";
      byId("editTrim").value = car.trim || "";
    }

    function onCarFieldChange(event) {
      state.decodedCar = {
        make: byId("editMake").value.trim(),
        model: byId("editModel").value.trim(),
        year: byId("editYear").value.trim(),
        trim: byId("editTrim").value.trim()
      };
      if (event && event.target && event.target.id === "editMake") {
        updateModelSuggestions(state.decodedCar.make);
      }
      refreshAllValidity();
      saveDraft();
    }

    function updateModelSuggestions(make) {
      var list = byId("modelsList");
      list.innerHTML = "";
      var suggestions = MODEL_SUGGESTIONS[make] || [];
      suggestions.forEach(function (model) {
        var option = document.createElement("option");
        option.value = model;
        list.appendChild(option);
      });
    }

    function getLangParts() {
      return PARTS_DATA[state.currentLang] || PARTS_DATA.uz;
    }

    function renderCats() {
      var container = byId("partsCats");
      var wrap = byId("subpartsWrap");
      var grid = byId("subpartsGrid");
      var parts = getLangParts();
      var search = state.searchTerm;
      container.innerHTML = "";

      var filteredCats = parts.filter(function (cat) {
        if (!search) {
          return true;
        }
        return cat.name.toLowerCase().indexOf(search) !== -1 ||
          cat.desc.toLowerCase().indexOf(search) !== -1 ||
          cat.subs.some(function (sub) { return sub.toLowerCase().indexOf(search) !== -1; });
      });

      filteredCats.forEach(function (cat) {
        var card = document.createElement("div");
        card.className = "cat-card" + (state.activeCatId === cat.id ? " active" : "");
        card.innerHTML = "<div class='cat-icon'>" + cat.icon + "</div><div><div class='cat-name'>" + cat.name + "</div><div class='cat-desc'>" + cat.desc + "</div></div>";
        card.addEventListener("click", function () {
          state.activeCatId = state.activeCatId === cat.id ? null : cat.id;
          renderCats();
        });
        container.appendChild(card);
      });

      if (!state.activeCatId) {
        wrap.classList.remove("show");
        grid.innerHTML = "";
        return;
      }

      var activeCat = parts.find(function (cat) { return cat.id === state.activeCatId; });
      if (!activeCat) {
        wrap.classList.remove("show");
        grid.innerHTML = "";
        return;
      }

      wrap.classList.add("show");
      grid.innerHTML = "";
      activeCat.subs
        .filter(function (sub) {
          return !search || sub.toLowerCase().indexOf(search) !== -1 || activeCat.name.toLowerCase().indexOf(search) !== -1;
        })
        .forEach(function (sub) {
          var key = buildPartKey(activeCat.id, sub, false);
          var tag = document.createElement("button");
          tag.type = "button";
          tag.className = "tag-btn" + (state.selectedParts[key] ? " selected" : "");
          tag.textContent = sub;
          tag.addEventListener("click", function () {
            togglePart(activeCat.id, sub, false, 1);
          });
          grid.appendChild(tag);
        });
    }

    function buildPartKey(catId, label, isCustom) {
      return [catId, label, isCustom ? "custom" : "preset"].join("::");
    }

    function togglePart(catId, label, isCustom, qty) {
      var key = buildPartKey(catId, label, isCustom);
      if (state.selectedParts[key]) {
        delete state.selectedParts[key];
      } else {
        state.selectedParts[key] = { catId: catId, label: label, isCustom: !!isCustom, qty: qty || 1 };
      }
      renderCats();
      renderSelectedParts();
      refreshAllValidity();
      saveDraft();
    }

    function addCustomPart() {
      var name = byId("customPartInput").value.trim();
      var qty = Number(byId("customQtyInput").value) || 1;
      if (!name) {
        alert(t("customPartRequired"));
        return;
      }
      var key = buildPartKey("custom", name, true);
      if (state.selectedParts[key]) {
        alert(t("customPartExists"));
        return;
      }
      state.selectedParts[key] = { catId: "custom", label: name, isCustom: true, qty: Math.max(1, qty) };
      byId("customPartInput").value = "";
      byId("customQtyInput").value = "1";
      renderSelectedParts();
      refreshAllValidity();
      saveDraft();
    }

    function renderSelectedParts() {
      var wrap = byId("selectedList");
      var keys = Object.keys(state.selectedParts);
      wrap.innerHTML = "";
      wrap.classList.toggle("empty", keys.length === 0);

      keys.forEach(function (key) {
        var item = state.selectedParts[key];
        var chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip-btn";
        chip.innerHTML = "<span>" + item.label + " ×" + item.qty + "</span><span class='chip-remove'>×</span>";
        chip.addEventListener("click", function () {
          delete state.selectedParts[key];
          renderCats();
          renderSelectedParts();
          refreshAllValidity();
          saveDraft();
        });
        wrap.appendChild(chip);
      });

      renderOrderSummary();
    }

    function renderToggleGroups() {
      renderToggleGroup("qualityGroup", "quality", [
        { value: "oem", label: t("prefOem") },
        { value: "aftermarket", label: t("prefAfter") },
        { value: "used", label: t("prefUsed") }
      ]);
      renderToggleGroup("altGroup", "alt", [
        { value: "yes", label: t("prefAltYes") },
        { value: "no", label: t("prefAltNo") }
      ]);
    }

    function renderToggleGroup(containerId, key, options) {
      var container = byId(containerId);
      container.innerHTML = "";
      options.forEach(function (option) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "toggle-btn" + (state.prefs[key] === option.value ? " active" : "");
        button.textContent = option.label;
        button.addEventListener("click", function () {
          state.prefs[key] = option.value;
          renderToggleGroups();
          renderOrderSummary();
          saveDraft();
        });
        container.appendChild(button);
      });
    }

    function handlePhotos(files) {
      Array.from(files).slice(0, MAX_PHOTOS - state.uploadedPhotos.length).forEach(function (file) {
        if (!file.type || file.type.indexOf("image/") !== 0) {
          return;
        }
        var reader = new FileReader();
        reader.onload = function (event) {
          state.uploadedPhotos.push({
            id: Date.now().toString(36) + Math.random().toString(16).slice(2),
            name: file.name,
            file: file,
            dataUrl: event.target.result
          });
          renderPhotos();
          refreshAllValidity();
        };
        reader.readAsDataURL(file);
      });
    }

    function renderPhotos() {
      var wrap = byId("photoPreviews");
      wrap.innerHTML = "";
      state.uploadedPhotos.forEach(function (photo) {
        var item = document.createElement("div");
        item.className = "photo-item";
        item.innerHTML = "<img alt='' src='" + photo.dataUrl + "'>";
        var del = document.createElement("button");
        del.className = "photo-del";
        del.type = "button";
        del.textContent = "×";
        del.addEventListener("click", function () {
          state.uploadedPhotos = state.uploadedPhotos.filter(function (entry) { return entry.id !== photo.id; });
          renderPhotos();
          refreshAllValidity();
        });
        item.appendChild(del);
        wrap.appendChild(item);
      });
      renderPhotoStatus();
      renderOrderSummary();
      saveDraft();
    }

    function renderPhotoStatus() {
      var label = byId("photoCount");
      if (state.uploadedPhotos.length >= MIN_PHOTOS) {
        label.style.color = "var(--success)";
        label.textContent = t("photoReady") + state.uploadedPhotos.length;
      } else {
        label.style.color = state.noPhoto ? "var(--warning)" : "var(--danger)";
        label.textContent = t("photoNeedMore") + Math.max(0, MIN_PHOTOS - state.uploadedPhotos.length);
      }
    }

    function renderCityOptions() {
      var select = byId("cityInput");
      var current = select.value;
      select.innerHTML = "";
      var placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = t("cityPlaceholder");
      select.appendChild(placeholder);
      CITY_OPTIONS.forEach(function (city) {
        var option = document.createElement("option");
        option.value = city;
        option.textContent = city;
        select.appendChild(option);
      });
      select.value = current || "";
    }

    function isStep1Valid() {
      return validateVin(byId("vinInput").value.trim()) &&
        byId("editMake").value.trim() &&
        byId("editYear").value.trim() &&
        byId("editModel").value.trim();
    }

    function isStep2Valid() {
      var hasParts = Object.keys(state.selectedParts).length > 0;
      var photoOk = state.uploadedPhotos.length >= MIN_PHOTOS || state.noPhoto;
      return hasParts && photoOk;
    }

    function isStep3Valid() {
      var name = byId("nameInput").value.trim();
      var telegram = byId("tgInput").value.trim();
      var phone = byId("phoneInput").value.trim();
      var city = byId("cityInput").value;
      return !!(name && (telegram || phone) && city && byId("chk1").checked && byId("chk2").checked);
    }

    function refreshAllValidity() {
      byId("btnStep1").disabled = !isStep1Valid();
      byId("btnStep2").disabled = !isStep2Valid();
      byId("btnStep3").disabled = !isStep3Valid();
      renderOrderSummary();
      saveDraft();
    }

    function goStep2() {
      if (!isStep1Valid()) {
        return;
      }
      state.orderVin = byId("vinInput").value.trim();
      state.decodedCar = {
        make: byId("editMake").value.trim(),
        model: byId("editModel").value.trim(),
        year: byId("editYear").value.trim(),
        trim: byId("editTrim").value.trim()
      };
      setStep(2);
    }

    function goStep3() {
      if (!isStep2Valid()) {
        alert(t("partsRequired"));
        return;
      }
      setStep(3);
    }

    function buildPartsSummary() {
      return Object.keys(state.selectedParts).map(function (key) {
        var item = state.selectedParts[key];
        return item.label + " ×" + item.qty;
      }).join(", ");
    }

    function renderOrderSummary() {
      var summary = byId("orderSummary");
      var vehicle = [byId("editMake").value.trim(), byId("editModel").value.trim(), byId("editYear").value.trim(), byId("editTrim").value.trim()].filter(Boolean).join(" / ");
      var contact = [byId("nameInput").value.trim(), byId("tgInput").value.trim() || byId("phoneInput").value.trim(), byId("cityInput").value].filter(Boolean).join(" / ");
      summary.innerHTML =
        "<div><strong>" + t("vehicleSummary") + ":</strong> " + safeText(vehicle) + "</div>" +
        "<div><strong>VIN:</strong> " + safeText(byId("vinInput").value.trim()) + "</div>" +
        "<div><strong>" + t("selectedLabel") + ":</strong> " + safeText(buildPartsSummary()) + "</div>" +
        "<div><strong>" + t("qualitySummary") + ":</strong> " + safeText(state.prefs.quality) + "</div>" +
        "<div><strong>" + t("altSummary") + ":</strong> " + safeText(state.prefs.alt) + "</div>" +
        "<div><strong>" + t("locationSummary") + ":</strong> " + safeText(byId("partLocationInput").value.trim()) + "</div>" +
        "<div><strong>" + t("photosSummary") + ":</strong> " + state.uploadedPhotos.length + (state.noPhoto ? " + no-photo-override" : "") + "</div>" +
        "<div><strong>" + t("commentSummary") + ":</strong> " + safeText(byId("commentInput").value.trim()) + "</div>" +
        "<div><strong>" + t("contactSummary") + ":</strong> " + safeText(contact) + "</div>";
    }

    function prefillTelegramUser() {
      if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) {
        return;
      }
      var user = tg.initDataUnsafe.user;
      if (user.first_name && !byId("nameInput").value) {
        byId("nameInput").value = user.first_name + (user.last_name ? " " + user.last_name : "");
      }
      if (user.username && !byId("tgInput").value) {
        byId("tgInput").value = "@" + user.username;
      }
      refreshAllValidity();
    }

    function makeDraftSnapshot() {
      return {
        currentLang: state.currentLang,
        currentStep: Math.min(state.currentStep, 3),
        activeCatId: state.activeCatId,
        searchTerm: state.searchTerm,
        orderVin: byId("vinInput").value.trim(),
        decodedCar: {
          make: byId("editMake").value.trim(),
          model: byId("editModel").value.trim(),
          year: byId("editYear").value.trim(),
          trim: byId("editTrim").value.trim()
        },
        prefs: state.prefs,
        selectedParts: state.selectedParts,
        noPhoto: state.noPhoto,
        textFields: {
          partLocation: byId("partLocationInput").value,
          comment: byId("commentInput").value,
          name: byId("nameInput").value,
          telegram: byId("tgInput").value,
          phone: byId("phoneInput").value,
          city: byId("cityInput").value
        },
        checks: {
          chk1: byId("chk1").checked,
          chk2: byId("chk2").checked
        }
      };
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(makeDraftSnapshot()));
      } catch (error) {}
    }

    function restoreDraft() {
      try {
        var raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) {
          return false;
        }
        var draft = JSON.parse(raw);
        if (!draft || typeof draft !== "object") {
          return false;
        }
        state.currentLang = draft.currentLang || state.currentLang;
        state.activeCatId = draft.activeCatId || null;
        state.searchTerm = draft.searchTerm || "";
        state.prefs = draft.prefs || state.prefs;
        state.selectedParts = draft.selectedParts || {};
        state.noPhoto = !!draft.noPhoto;
        byId("vinInput").value = draft.orderVin || "";
        fillCarForm(draft.decodedCar || state.decodedCar);
        byId("partLocationInput").value = draft.textFields ? draft.textFields.partLocation || "" : "";
        byId("commentInput").value = draft.textFields ? draft.textFields.comment || "" : "";
        byId("nameInput").value = draft.textFields ? draft.textFields.name || "" : "";
        byId("tgInput").value = draft.textFields ? draft.textFields.telegram || "" : "";
        byId("phoneInput").value = draft.textFields ? draft.textFields.phone || "" : "";
        byId("cityInput").value = draft.textFields ? draft.textFields.city || "" : "";
        byId("chk1").checked = !!(draft.checks && draft.checks.chk1);
        byId("chk2").checked = !!(draft.checks && draft.checks.chk2);
        byId("noPhotoCheck").checked = state.noPhoto;
        byId("partsSearch").value = state.searchTerm;
        byId("draftNote").classList.remove("hidden");
        setLang(state.currentLang);
        updateModelSuggestions(byId("editMake").value.trim());
        if (draft.orderVin && validateVin(draft.orderVin)) {
          setVinBadge("warn", "DRAFT");
          byId("carInfo").classList.remove("hidden");
        }
        renderCats();
        renderSelectedParts();
        setStep(draft.currentStep || 1);
        return true;
      } catch (error) {
        return false;
      }
    }

    function clearDraft() {
      localStorage.removeItem(DRAFT_KEY);
      byId("draftNote").classList.add("hidden");
    }

    function resetAll() {
      clearDraft();
      state.activeCatId = null;
      state.searchTerm = "";
      state.selectedParts = {};
      state.uploadedPhotos = [];
      state.noPhoto = false;
      state.prefs = { quality: "oem", alt: "no" };
      state.lastVinLookupId += 1;
      document.querySelectorAll("input, textarea").forEach(function (input) {
        if (input.type === "checkbox" || input.type === "file") {
          input.checked = false;
          return;
        }
        input.value = "";
      });
      byId("cityInput").value = "";
      byId("partsSearch").value = "";
      byId("customQtyInput").value = "1";
      setVinBadge("", "");
      setVinStatus("", false);
      byId("carInfo").classList.add("hidden");
      renderToggleGroups();
      renderCats();
      renderSelectedParts();
      renderPhotos();
      refreshAllValidity();
      setStep(1);
    }

    function buildTelegramText(orderId) {
      var parts = Object.keys(state.selectedParts).map(function (key) {
        var item = state.selectedParts[key];
        return "- " + item.label + " x" + item.qty;
      }).join("\n");
      var lines = [
        t("orderCreated") + ": " + orderId,
        "",
        "VIN: " + safeText(byId("vinInput").value.trim()),
        t("vehicleSummary") + ": " + [byId("editMake").value.trim(), byId("editModel").value.trim(), byId("editYear").value.trim(), byId("editTrim").value.trim()].filter(Boolean).join(" / "),
        "",
        t("selectedLabel") + ":",
        parts || "-",
        "",
        t("qualitySummary") + ": " + state.prefs.quality,
        t("altSummary") + ": " + state.prefs.alt,
        t("locationSummary") + ": " + safeText(byId("partLocationInput").value.trim()),
        t("commentSummary") + ": " + safeText(byId("commentInput").value.trim()),
        t("photosSummary") + ": " + state.uploadedPhotos.length + (state.noPhoto ? " (override)" : ""),
        "",
        t("contactSummary") + ":",
        "Name: " + safeText(byId("nameInput").value.trim()),
        "Telegram: " + safeText(byId("tgInput").value.trim()),
        "Phone: " + safeText(byId("phoneInput").value.trim()),
        "City: " + safeText(byId("cityInput").value)
      ];
      return lines.join("\n");
    }

    async function sendTelegramPhotos(orderId) {
      if (!state.uploadedPhotos.length) {
        return;
      }
      var formData = new FormData();
      formData.append("chat_id", TELEGRAM_CHAT_ID);
      var media = state.uploadedPhotos.slice(0, 10).map(function (photo, index) {
        var fieldName = "photo" + index;
        formData.append(fieldName, photo.file, photo.name || fieldName + ".jpg");
        return {
          type: "photo",
          media: "attach://" + fieldName,
          caption: index === 0 ? "Photos for " + orderId : undefined
        };
      });
      formData.append("media", JSON.stringify(media));
      var response = await fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMediaGroup", {
        method: "POST",
        body: formData
      });
      if (!response.ok) {
        throw new Error("sendMediaGroup failed");
      }
    }

    function finalizeOrder(orderId) {
      byId("orderIdBox").textContent = orderId;
      clearDraft();
      setStep(4);
    }

    async function submitOrder() {
      if (!isStep3Valid()) {
        return;
      }
      var button = byId("btnStep3");
      button.disabled = true;
      button.innerHTML = "<span class='spinner'></span><span>...</span>";
      var orderId = "ORD-" + Date.now().toString(36).toUpperCase();

      try {
        if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) {
          finalizeOrder(orderId);
          return;
        }

        var response = await fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: buildTelegramText(orderId)
          })
        });
        var data = await response.json();
        if (!data.ok) {
          throw new Error(data.description || "sendMessage failed");
        }

        await sendTelegramPhotos(orderId);
        finalizeOrder(orderId);
      } catch (error) {
        console.warn("Telegram submit failed, completing locally.", error);
        finalizeOrder(orderId);
        return;
      }

      button.innerHTML = "<span>📤</span><span>" + t("submit") + "</span>";
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
