<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapchastChi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: var(--tg-theme-bg-color, #0a0c0f);
  --surface: var(--tg-theme-secondary-bg-color, #111318);
  --surface2: var(--tg-theme-secondary-bg-color, #1a1d24);
  --border: #2a2d35;
  --accent: var(--tg-theme-button-color, #e8b84b);
  --accent2: #3b8bff;
  --text: var(--tg-theme-text-color, #e8eaf0);
  --muted: var(--tg-theme-hint-color, #6b7280);
  --success: #22c55e; --danger: #ef4444;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-body: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:root { --tg-safe-top: env(safe-area-inset-top, 0px); }
body { padding-top: var(--tg-safe-top); }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,139,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,139,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
header {
  display: none !important; /* Hidden in Telegram Mini App */
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,12,15,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
}
.logo { font-family: var(--font-display); font-size: 26px; letter-spacing: 2px; color: var(--accent); }
.logo span { color: var(--text); }
.lang-switcher { display: flex; gap: 4px; }
.lang-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: var(--font-mono); font-size: 11px; padding: 5px 10px;
  cursor: pointer; border-radius: 4px; transition: all .2s; letter-spacing: 1px;
}
.lang-btn.active, .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
/* ── Banner strip ── */
.banner-strip {
  position: relative;
  padding: 10px 16px 4px;
  background: var(--bg);
  user-select: none; touch-action: pan-y;
  overflow: hidden; /* MUST clip */
}
.banner-track {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  width: 100%;
  transition: transform .4s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
.banner-slide {
  min-width: 100%;
  max-width: 100%;
  flex: 0 0 100%;
  border-radius: 16px;
  padding: 14px;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; box-sizing: border-box;
  border: 1px solid transparent;
  overflow: hidden;
  flex-shrink: 0;
}
/* tag-specific card skin */
.banner-slide.tag-new {
  background: linear-gradient(135deg, rgba(34,197,94,.12) 0%, rgba(34,197,94,.04) 100%);
  border-color: rgba(34,197,94,.25);
}
.banner-slide.tag-promo {
  background: linear-gradient(135deg, rgba(232,184,75,.14) 0%, rgba(232,184,75,.04) 100%);
  border-color: rgba(232,184,75,.3);
}
.banner-slide.tag-notice {
  background: linear-gradient(135deg, rgba(59,139,255,.13) 0%, rgba(59,139,255,.04) 100%);
  border-color: rgba(59,139,255,.25);
}
/* subtle glow in corner */
.banner-slide::before {
  content: ''; position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  border-radius: 50%;
  pointer-events: none;
  opacity: .25;
  filter: blur(28px);
}
.banner-slide.tag-new::before    { background: #22c55e; }
.banner-slide.tag-promo::before  { background: #e8b84b; }
.banner-slide.tag-notice::before { background: #3b8bff; }

/* top row: icon + tag + close */
.banner-top {
  display: flex; align-items: center; gap: 8px;
}
.banner-icon {
  font-size: 22px; flex-shrink: 0; line-height: 1;
}
.banner-tag {
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 3px 8px; border-radius: 20px; font-weight: 700;
  flex-shrink: 0;
}
.banner-tag.new    { background: rgba(34,197,94,.18);  color: var(--success); }
.banner-tag.promo  { background: rgba(232,184,75,.18); color: var(--accent); }
.banner-tag.notice { background: rgba(59,139,255,.18); color: var(--accent2); }
.banner-close {
  margin-left: auto;
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px;
  cursor: pointer; padding: 0;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
  line-height: 1;
}
.banner-close:hover { background: rgba(255,255,255,.12); color: var(--text); }

/* text block */
.banner-body { flex: 1; min-width: 0; }
.banner-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  line-height: 1.3; margin-bottom: 3px;
}
.banner-desc {
  font-size: 11px; color: var(--muted); line-height: 1.4;
}

/* dots */
.banner-dots {
  display: flex; justify-content: center; gap: 5px;
  padding: 6px 0 2px;
}
.banner-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); cursor: pointer; transition: all .25s;
}
.banner-dot.active { background: var(--accent); width: 16px; border-radius: 3px; }
.banner-strip.hidden { display: none; }
.steps-bar {
  position: sticky; top: 52px; z-index: 90;
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  margin: 0; padding: 0;
}
.step-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 4px; position: relative; cursor: default;
  transition: background .2s;
}
.step-item::after { display: none !important; }
.step-item.active { background: var(--surface2); }
.step-item.active::before {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 10px; color: var(--muted);
  background: var(--bg); position: relative; z-index: 1; transition: all .3s;
  margin-bottom: 4px;
}
.step-item.active .step-num { border-color: var(--accent); color: var(--accent); }
.step-item.done .step-num { background: var(--accent); border-color: var(--accent); color: var(--bg); font-size: 0; }
.step-item.done .step-num::after { content: '✓'; font-size: 10px; }
.step-label { font-size: 9px; font-family: var(--font-mono); color: var(--muted); text-align: center; letter-spacing: .3px; line-height: 1.2; }
.step-item.active .step-label { color: var(--accent); }
.card-wrap { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:0 16px 80px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:0 0 16px 16px; border-top: none; padding:28px 24px; animation:fadeUp .3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.card-title { font-family:var(--font-display); font-size:24px; letter-spacing:1px; margin-bottom:6px; }
.card-subtitle { font-size:12px; color:var(--muted); margin-bottom:20px; line-height:1.5; }
.field { margin-bottom: 20px; }
.field label { display:block; font-size:11px; font-family:var(--font-mono); letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.field input, .field select, .field textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:var(--font-mono); font-size:14px; padding:12px 16px; outline:none; transition:border-color .2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent2); box-shadow:0 0 0 3px rgba(59,139,255,0.1); }
.field input.error { border-color: var(--danger); }
.field .hint { font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-top:6px; }
.field .hint.error-msg { color: var(--danger); }
.vin-wrap { position: relative; }
.vin-wrap input { padding-right:52px; text-transform:uppercase; letter-spacing:2px; font-size:15px; }
.vin-badge { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:10px; font-family:var(--font-mono); padding:3px 7px; border-radius:4px; letter-spacing:1px; }
.vin-badge.ok  { background:rgba(34,197,94,.2); color:var(--success); }
.vin-badge.bad { background:rgba(239,68,68,.2); color:var(--danger); }

/* VIN guide */
.vin-guide-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-family: var(--font-mono);
  color: var(--accent2); cursor: pointer; margin-top: 10px;
  background: none; border: none; padding: 0; text-decoration: underline;
  text-underline-offset: 3px;
}
.vin-guide-toggle:hover { color: var(--text); }
.vin-guide {
  display: none; margin-top: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.vin-guide.open { display: block; animation: fadeUp .25s ease both; }
.vin-guide-title {
  font-size: 11px; font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); padding: 14px 16px 8px;
}
.vin-locations {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 1px; background: var(--border);
}
.vin-loc {
  background: var(--surface2); padding: 14px 12px; text-align: center;
}
.vin-loc-icon { font-size: 26px; margin-bottom: 8px; }
.vin-loc-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  margin-bottom: 4px; line-height: 1.3;
}
.vin-loc-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.vin-diagram {
  padding: 16px; border-top: 1px solid var(--border);
}
.vin-diagram-label {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
}
/* SVG car diagram */
.car-svg-wrap { position: relative; }
.car-svg-wrap svg { width: 100%; height: auto; }
.vin-sample-box {
  background: rgba(59,139,255,0.1); border: 1px solid var(--accent2);
  border-radius: 6px; padding: 8px 12px; margin-top: 12px;
  font-family: var(--font-mono); font-size: 13px; letter-spacing: 2px;
  color: var(--accent2); text-align: center;
}
.vin-sample-box span { color: var(--muted); font-size: 10px; display: block; margin-top: 2px; letter-spacing: 1px; }
.vin-digits {
  display: flex; margin-top: 10px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); font-family: var(--font-mono);
}
.vin-digit-group { flex: 1; padding: 8px 6px; text-align: center; font-size: 11px; }
.vin-digit-group.g1 { background: rgba(232,184,75,0.15); border-right: 1px solid var(--border); }
.vin-digit-group.g2 { background: rgba(59,139,255,0.1); border-right: 1px solid var(--border); }
.vin-digit-group.g3 { background: rgba(34,197,94,0.1); }
.vin-digit-group .dg-val { font-size: 14px; font-weight: 600; letter-spacing: 2px; margin-bottom: 3px; }
.vin-digit-group.g1 .dg-val { color: var(--accent); }
.vin-digit-group.g2 .dg-val { color: var(--accent2); }
.vin-digit-group.g3 .dg-val { color: var(--success); }
.vin-digit-group .dg-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
@media(max-width:500px){ .vin-locations { grid-template-columns: 1fr 1fr; } }

.car-edit-notice {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--accent2); margin-bottom: 14px; letter-spacing: .3px;
}
.car-edit-notice::before { content: 'ℹ '; }
.car-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:500px){ .car-edit-grid { grid-template-columns: 1fr; } }
.car-info .field { margin-bottom: 14px; }
.car-info .field:last-child { margin-bottom: 0; }
.car-info { background:var(--surface2); border:1px solid var(--accent); border-radius:10px; padding:18px 20px; display:none; margin-bottom:24px; animation:fadeUp .3s ease both; }
.car-info.show { display: block; }
.car-info-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.car-info-item .label { font-size:10px; font-family:var(--font-mono); color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.car-info-item .value { font-size:16px; font-family:var(--font-display); letter-spacing:1px; color:var(--accent); }
.parts-categories { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
.cat-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; transition:all .2s; user-select:none; display:flex; align-items:center; gap:12px; }
.cat-card:hover { border-color: var(--accent2); }
.cat-card.selected { border-color:var(--accent); background:rgba(232,184,75,0.08); }
.cat-icon { font-size:22px; flex-shrink:0; }
.cat-name { font-size:13px; font-weight:500; }
.cat-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.subparts-wrap { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:20px; display:none; }
.subparts-wrap.show { display: block; }
.subparts-title { font-size:11px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px; }
.subparts-grid { display:flex; flex-wrap:wrap; gap:8px; }
.sub-tag { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; transition:all .2s; font-family:var(--font-mono); }
.sub-tag:hover { border-color:var(--accent2); color:var(--accent2); }
.sub-tag.selected { background:rgba(232,184,75,0.12); border-color:var(--accent); color:var(--accent); }
.selected-parts-list { min-height:48px; background:var(--surface2); border:1px dashed var(--border); border-radius:8px; padding:12px; display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
.selected-parts-list.empty::after { content:attr(data-empty); font-size:12px; color:var(--muted); font-family:var(--font-mono); }
.part-chip { background:rgba(232,184,75,0.12); border:1px solid var(--accent); border-radius:20px; padding:4px 10px 4px 12px; font-size:11px; font-family:var(--font-mono); color:var(--accent); display:flex; align-items:center; gap:6px; }
.part-chip button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:14px; line-height:1; padding:0; opacity:.7; }
.part-chip button:hover { opacity:1; }
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.btn { width:100%; padding:14px 24px; font-family:var(--font-display); font-size:18px; letter-spacing:2px; border:none; border-radius:10px; cursor:pointer; transition:all .2s; }
.tg-mode .btn-primary { display: none; } /* Replaced by Telegram MainButton */
.tg-mode .btn-secondary { display: none; } /* Replaced by Telegram BackButton */
.btn-primary { background:var(--accent); color:var(--bg); }
.btn-primary:hover { background:#f5c85a; transform:translateY(-1px); }
.btn-primary:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); margin-bottom:12px; }
.btn-secondary:hover { border-color: var(--accent2); }
.success-screen { text-align:center; padding:20px 0; }
.success-icon { font-size:64px; margin-bottom:24px; animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.success-screen h2 { font-family:var(--font-display); font-size:36px; letter-spacing:2px; margin-bottom:12px; }
.success-screen p { color:var(--muted); font-size:14px; line-height:1.7; max-width:400px; margin:0 auto 24px; }
.order-id-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 20px; font-family:var(--font-mono); font-size:14px; display:inline-block; color:var(--accent); margin-bottom:24px; }
.spinner { width:18px; height:18px; border:2px solid transparent; border-top-color:var(--bg); border-radius:50%; animation:spin .6s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
@keyframes spin { to{transform:rotate(360deg)} }
footer { position:relative; z-index:1; text-align:center; padding:14px; border-top:1px solid var(--border); }
footer a { color:var(--accent2); text-decoration:none; }

/* Photo upload */
.photo-upload-area {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all .2s; margin-bottom: 8px; position: relative;
}
.photo-upload-area:hover, .photo-upload-area.dragover { border-color: var(--accent2); background: rgba(59,139,255,0.04); }
.photo-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
.photo-upload-icon { font-size: 28px; margin-bottom: 8px; }
.photo-upload-text { font-size: 13px; color: var(--muted); }
.photo-upload-text strong { color: var(--text); }
.photo-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.photo-thumb {
  width: 72px; height: 72px; border-radius: 8px; object-fit: cover;
  border: 1px solid var(--border); position: relative;
}
.photo-thumb-wrap { position: relative; display: inline-block; }
.photo-thumb-del {
  position:absolute; top:-6px; right:-6px; width:18px; height:18px;
  background: var(--danger); color: #fff; border: none; border-radius: 50%;
  font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.photo-count { font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-top: 6px; }
.photo-count.ok { color: var(--success); }
.photo-count.warn { color: var(--danger); }

/* Preference toggles */
.pref-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.pref-toggle {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; cursor: pointer;
  font-size: 12px; font-family: var(--font-mono); transition: all .2s;
  user-select: none;
}
.pref-toggle:hover { border-color: var(--accent2); }
.pref-toggle.selected { background: rgba(232,184,75,0.12); border-color: var(--accent); color: var(--accent); }

/* Disclaimer checkboxes */
.disclaimer-box {
  background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px; padding: 16px 18px; margin-bottom: 20px;
}
.disclaimer-title {
  font-size: 11px; font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 1px; color: var(--danger); margin-bottom: 12px;
}
.disclaimer-item {
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; cursor: pointer;
}
.disclaimer-item:last-child { margin-bottom: 0; }
.disclaimer-item input[type=checkbox] { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; width:15px; height:15px; cursor:pointer; }
.disclaimer-item span { font-size: 12px; color: var(--muted); line-height: 1.6; }
.disclaimer-item span strong { color: var(--text); }

@media(max-width:600px){.card{padding:24px 20px}.parts-categories{grid-template-columns:1fr}.contact-grid{grid-template-columns:1fr}.car-info-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="app-header-left">
    <div class="logo">Z<span>CHI</span></div>
    <div class="app-brand-full">ZapchastChi</div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ru')">РУС</button>
    <button class="lang-btn" onclick="setLang('uz')">UZB</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
  </div>
</header>

<!-- App subtitle bar -->
<div class="app-subbar">
  <span data-i18n="appSubbar"></span>
</div>

<!-- ═══ ANNOUNCEMENT BANNER — edit banners[] in JS to update ═══ -->
<div class="banner-strip" id="bannerStrip">
  <div class="banner-track" id="bannerTrack">
    <!-- Injected by JS -->
  </div>
  <div class="banner-dots" id="bannerDots"></div>
</div>

<div class="steps-bar" id="stepsBar" role="tablist">
  <div class="step-item active" id="step-ind-1"><div class="step-num">1</div><div class="step-label" data-i18n="step1"></div></div>
  <div class="step-item" id="step-ind-2"><div class="step-num">2</div><div class="step-label" data-i18n="step2"></div></div>

function onVinInput(el){
  var v = el.value.toUpperCase().replace(/[IOQ]/g,'');
  el.value = v;
  var badge = document.getElementById('vinBadge');
  var hint  = document.getElementById('vinHint');
  var info  = document.getElementById('carInfo');
  var btn   = document.getElementById('btnStep1');

  // Clear any pending lookup
  if(vinLookupTimer) clearTimeout(vinLookupTimer);

  if(v.length < 17){
    badge.style.display='none';
    info.classList.remove('show');
    btn.disabled=true;
    el.classList.remove('error');
    hint.className='hint';
    hint.textContent = t('vinHint');
    return;
  }

  if(!validateVin(v)){
    badge.style.display=''; badge.className='vin-badge bad'; badge.textContent=t('vinBad');
    el.classList.add('error'); info.classList.remove('show'); btn.disabled=true;
    hint.className='hint error-msg'; hint.textContent='✗ '+t('vinHint');
    return;
  }

  // Valid format — show loading state
  el.classList.remove('error');
  badge.style.display=''; badge.className='vin-badge'; 
  badge.style.background='rgba(59,139,255,0.15)'; badge.style.color='var(--accent2)';
  badge.textContent='...';
  hint.className='hint'; hint.textContent=t('vinLooking');
  btn.disabled=true;

  // Debounce 400ms then call API
  vinLookupTimer = setTimeout(function(){ lookupVin(v); }, 400);
}

async function proxyFetch(url){
  // Try direct first, then CORS proxy
  try {
    var r = await fetch(url); if(r.ok) return r.json();
  } catch(e){}
  var r2 = await fetch('https://corsproxy.io/?url='+encodeURIComponent(url));
  if(!r2.ok) throw new Error('HTTP '+r2.status);
  return r2.json();
}

async function lookupVin(vin){
  var badge = document.getElementById('vinBadge');
  var hint  = document.getElementById('vinHint');
  var info  = document.getElementById('carInfo');

  try {
    // Call VIN + specs in parallel
    var base = 'https://api.auto.dev/vin/'+vin+'?apiKey='+AUTODEV_API_KEY;
    var spec = 'https://api.auto.dev/specs/'+vin+'?apiKey='+AUTODEV_API_KEY;

    var results = await Promise.allSettled([proxyFetch(base), proxyFetch(spec)]);
    var d  = results[0].status==='fulfilled' ? results[0].value : null;
    var ds = results[1].status==='fulfilled' ? results[1].value : null;

    if(!d || d.errorCode) throw new Error('VIN API failed');

    // ── Fields from /vin endpoint ──
    var make = (d.make || (d.vehicle && d.vehicle.make) || '').trim();
    var year = (
      (d.vehicle && d.vehicle.year) ||
      (d.years && d.years[0]) ||
      ''
    ).toString();

    // ── Fields from /specs endpoint (richer data) ──
    var model = '', trim = '', engine = '';
    if(ds && !ds.errorCode){
      // specs returns array of matching specs
      var specs = Array.isArray(ds) ? ds : (ds.data || ds.specs || [ds]);
      if(specs.length > 0){
        var s = specs[0];
        model  = (s.model  || s.modelName || '').trim();
        trim   = (s.trim   || s.submodel  || s.series || '').trim();
        var disp = s.engineDisplacement || (s.engine && s.engine.displacement) || '';
        var fuel = s.fuelType || (s.engine && s.engine.fuelType) || '';
        var pwr  = s.horsepower ? s.horsepower+'hp' : '';
        engine = [disp, fuel, pwr].filter(Boolean).join(' ');
      }
    }

    // If specs gave nothing, try BRAND_MODELS suggestions
    if(!model && BRAND_MODELS[make] && BRAND_MODELS[make].length){
      // populate dropdown but leave field blank for user to pick
      var dl = document.getElementById('modelsList');
      dl.innerHTML = '';
      BRAND_MODELS[make].forEach(function(m){
        var o = document.createElement('option'); o.value=m; dl.appendChild(o);
      });
    }

    document.getElementById('editMake').value  = make;
    document.getElementById('editModel').value = model;
    document.getElementById('editYear').value  = year;
    document.getElementById('editTrim').value  = [trim, engine].filter(Boolean).join(' · ');

    decodedCar = {make:make, model:model, year:year, trim:trim};

    badge.className='vin-badge ok';
    badge.style.background=''; badge.style.color='';
    badge.textContent = make || t('vinOk');

    // Tell user if model needs manual input
    if(!model){
      hint.className='hint';
      hint.textContent = t('vinNoModel');
    } else {
      hint.textContent = '';
    }

    info.classList.add('show');
    checkCarFields();

  } catch(e) {
    // Full fallback to local WMI
    console.warn('[VIN] API failed, using local WMI:', e.message);
    var wmi = vin.substring(0,3).toUpperCase();
    var localMake = WMI_DB[vin.substring(0,4).toUpperCase()] || WMI_DB[wmi] || '';
    var yearChar  = vin[9].toUpperCase();
    var localYear = YEAR_MAP[yearChar] || '';

    document.getElementById('editMake').value  = localMake;
    document.getElementById('editYear').value  = localYear;
    document.getElementById('editModel').value = '';
    document.getElementById('editTrim').value  = '';

    badge.className='vin-badge';
    badge.style.background='rgba(232,184,75,0.2)'; badge.style.color='var(--accent)';
    badge.textContent = t('vinUnknown');
    hint.className='hint';
    hint.textContent = t('vinFallback');
    info.classList.add('show');
    checkCarFields();
  }
}

//  STATE
// ============================================================
var selectedParts = {};
var activeCatId = null;
var orderVin = '';

// ============================================================
//  STEPS
// ============================================================
function setStep(n){
  for(var i=1;i<=4;i++){
    document.getElementById('step'+i).style.display = i===n?'block':'none';
    var ind = document.getElementById('step-ind-'+i);
    ind.className = 'step-item' + (i===n?' active':'') + (i<n?' done':'');
  }
  window.scrollTo({top:0,behavior:'smooth'});
}
function goStep1(){ setStep(1); }
function goStep2(){
  orderVin = document.getElementById('vinInput').value.toUpperCase();
  decodedCar = {
    make:  document.getElementById('editMake').value.trim(),
    model: document.getElementById('editModel').value.trim(),
    year:  document.getElementById('editYear').value.trim(),
    trim:  document.getElementById('editTrim').value.trim()
  };
  renderCats(); updateSelectedList(); setStep(2);
}
function goStep3(){ if(Object.keys(selectedParts).length>0) setStep(3); }
function resetAll(){
  document.getElementById('vinInput').value='';
  document.getElementById('vinBadge').style.display='none';
  document.getElementById('carInfo').classList.remove('show');
  document.getElementById('editMake').value='';
  document.getElementById('editModel').value='';
  document.getElementById('editYear').value='';
  document.getElementById('editTrim').value='';
  document.getElementById('btnStep1').disabled=true;
  selectedParts={}; activeCatId=null; decodedCar=null;
  document.getElementById('nameInput').value='';
  document.getElementById('tgInput').value='';
  document.getElementById('phoneInput').value='';
  document.getElementById('cityInput').value='';
  document.getElementById('commentInput').value='';
  setStep(1);
}

// ============================================================
//  PARTS RENDERING
// ============================================================
function renderCats(){
  var cats = PARTS_DATA[currentLang]||PARTS_DATA.ru;
  var container = document.getElementById('partsCats');
  container.innerHTML='';
  cats.forEach(function(cat){
    var count = Object.keys(selectedParts).filter(function(k){ return k.indexOf(cat.id+'::')===0; }).length;
    var div = document.createElement('div');
    div.className='cat-card'+(activeCatId===cat.id?' selected':'');
    div.innerHTML='<div class="cat-icon">'+cat.icon+'</div><div><div class="cat-name">'+cat.name+(count?' <span style="color:var(--accent);font-size:11px;font-family:var(--font-mono)">('+count+')</span>':'')+'</div><div class="cat-desc">'+cat.desc+'</div></div>';
    div.onclick=(function(id){ return function(){ toggleCat(id); }; })(cat.id);
    container.appendChild(div);
  });
  renderSubparts();
}

function toggleCat(id){ activeCatId=(activeCatId===id)?null:id; renderCats(); }

function renderSubparts(){
  var wrap = document.getElementById('subpartsWrap');
  var grid = document.getElementById('subpartsGrid');
  if(!activeCatId){ wrap.classList.remove('show'); return; }
  var cats = PARTS_DATA[currentLang]||PARTS_DATA.ru;
  var cat = null;
  for(var i=0;i<cats.length;i++){ if(cats[i].id===activeCatId){ cat=cats[i]; break; } }
  if(!cat){ wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  grid.innerHTML='';
  cat.subs.forEach(function(sub){
    var key = cat.id+'::'+sub;
    var tag = document.createElement('div');
    tag.className='sub-tag'+(selectedParts[key]?' selected':'');
    tag.textContent=sub;
    tag.onclick=(function(k){ return function(){ togglePart(k); }; })(key);
    grid.appendChild(tag);
  });
}

function togglePart(key){
  if(selectedParts[key]) delete selectedParts[key];
  else selectedParts[key]=true;
  renderCats(); updateSelectedList();
  document.getElementById('btnStep2').disabled = Object.keys(selectedParts).length===0;
}

function updateSelectedList(){
  var list = document.getElementById('selectedList');
  list.innerHTML='';
  var keys = Object.keys(selectedParts);
  if(keys.length===0){ list.classList.add('empty'); return; }
  list.classList.remove('empty');
  keys.forEach(function(key){
    var partName = key.split('::')[1];
    var chip = document.createElement('div');
    chip.className='part-chip';
    var btn = document.createElement('button');
    btn.textContent='×'; btn.title='Remove';
    btn.onclick=(function(k){ return function(){ togglePart(k); }; })(key);
    chip.appendChild(document.createTextNode(partName+' '));
    chip.appendChild(btn);
    list.appendChild(chip);
  });
}

// ============================================================
//  SUBMIT
// ============================================================
async function submitOrder(){
  var btn = document.getElementById('btnStep3');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>...';

  var name  = document.getElementById('nameInput').value.trim();
  var tg    = document.getElementById('tgInput').value.trim();
  var phone = document.getElementById('phoneInput').value.trim();
  var city  = document.getElementById('cityInput').value;
  var comment = document.getElementById('commentInput').value.trim();
  var orderId = 'ORD-'+Date.now().toString(36).toUpperCase();
  var carInfo = decodedCar
    ? [decodedCar.make, decodedCar.model, decodedCar.trim, decodedCar.year ? '('+decodedCar.year+')' : ''].filter(Boolean).join(' ')
    : 'Unknown';

  var partLines = Object.keys(selectedParts).map(function(k){ return '  - '+k.split('::')[1]; }).join('\n');
  var location = document.getElementById('partLocationInput').value.trim();
  var quality  = getPref('quality');
  var altBrand = getPref('alt');

  var lines = [
    'NEW ORDER - '+orderId,
    '',
    'Car: '+carInfo,
    'VIN: '+orderVin,
    '',
    'Parts:',
    partLines || '  - not specified',
    '',
    'Preferences:',
    '  Quality: '+quality,
    '  Alt brand: '+altBrand,
    location ? '  Location: '+location : ''
  ];
  if(comment) lines.push('', 'Comment: '+comment);
  if(uploadedPhotos.length > 0) lines.push('', 'Photos: '+uploadedPhotos.length+' (see next message)');
  lines.push('', 'Contact:', '  Name: '+name, '  Telegram: '+(tg||'-'), '  Phone: '+(phone||'-'), '  City: '+city, '', 'zapchastchi.com');

  var message = lines.filter(function(l){ return l !== undefined; }).join('\n');

  try {
    // 1. Send text message
    var res = await fetch('https://api.telegram.org/bot'+TELEGRAM_BOT_TOKEN+'/sendMessage', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: TELEGRAM_CHAT_ID, text: message})
    });
    var data = await res.json();
    if(!data.ok) throw new Error(data.description||'Telegram error');

    // 2. Send photos if any (using sendMediaGroup for 2+, sendPhoto for 1)
    if(uploadedPhotos.length > 0) {
      if(uploadedPhotos.length === 1) {
        // Single photo via sendPhoto
        var fd = new FormData();
        fd.append('chat_id', TELEGRAM_CHAT_ID);
        fd.append('photo', uploadedPhotos[0].file);
        fd.append('caption', 'Photos for ' + orderId);
        await fetch('https://api.telegram.org/bot'+TELEGRAM_BOT_TOKEN+'/sendPhoto', {
          method:'POST', body: fd
        });
      } else {
        // Multiple photos via sendMediaGroup (max 10)
        var fd2 = new FormData();
        fd2.append('chat_id', TELEGRAM_CHAT_ID);
        var mediaArr = [];
        uploadedPhotos.slice(0,10).forEach(function(p, i){
          var fieldName = 'photo'+i;
          fd2.append(fieldName, p.file);
          mediaArr.push({
            type: 'photo',
            media: 'attach://'+fieldName,
            caption: i === 0 ? 'Photos for '+orderId : ''
          });
        });
        fd2.append('media', JSON.stringify(mediaArr));
        await fetch('https://api.telegram.org/bot'+TELEGRAM_BOT_TOKEN+'/sendMediaGroup', {
          method:'POST', body: fd2
        });
      }
    }

    document.getElementById('orderIdBox').textContent = orderId;
    setStep(4);
    // In Mini App, send data back to bot and show close button
    if(tg && isTgApp){ tg.MainButton.show(); tg.MainButton.enable(); }
  } catch(e) {
    btn.disabled=false;
    btn.innerHTML = t('submit');
    alert('Error: '+e.message);
  }
}

// ============================================================
//  PREFERENCES
// ============================================================
function togglePref(el) {
  var group = el.getAttribute('data-group');
  // single-select within group
  document.querySelectorAll('.pref-toggle[data-group="'+group+'"]').forEach(function(t){ t.classList.remove('selected'); });
  el.classList.add('selected');
}

function getPref(group) {
  var sel = document.querySelector('.pref-toggle[data-group="'+group+'"].selected');
  return sel ? sel.getAttribute('data-val') : '';
}

function applyPrefLabels() {
  document.querySelectorAll('.pref-toggle[data-i18n-val]').forEach(function(el){
    var k = el.getAttribute('data-i18n-val');
    el.textContent = t(k);
  });
  var loc = document.getElementById('partLocationInput');
  if(loc) loc.placeholder = t('partLocationPlaceholder');
}

// ============================================================
//  PHOTO UPLOAD
// ============================================================
var uploadedPhotos = []; // array of {file, dataUrl}

function handlePhotos(files) {
  for(var i=0;i<files.length;i++){
    if(uploadedPhotos.length >= 6) break;
    (function(file){
      var reader = new FileReader();
      reader.onload = function(e){
        uploadedPhotos.push({file:file, dataUrl:e.target.result});
        renderPreviews();
        checkStep2Btn();
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

function renderPreviews(){
  var wrap = document.getElementById('photoPreviews');
  var countEl = document.getElementById('photoCount');
  wrap.innerHTML = '';
  uploadedPhotos.forEach(function(p, idx){
    var w = document.createElement('div'); w.className='photo-thumb-wrap';
    var img = document.createElement('img'); img.className='photo-thumb'; img.src=p.dataUrl;
    var del = document.createElement('button'); del.className='photo-thumb-del'; del.innerHTML='&times;';
    del.onclick = (function(i){ return function(){ uploadedPhotos.splice(i,1); renderPreviews(); checkStep2Btn(); }; })(idx);
    w.appendChild(img); w.appendChild(del); wrap.appendChild(w);
  });
  var n = uploadedPhotos.length;
  if(n===0){ countEl.className='photo-count warn'; countEl.textContent=t('photoCount0'); }
  else if(n<3){ countEl.className='photo-count warn'; countEl.textContent=t('photoCountWarn')+(3-n); }
  else{ countEl.className='photo-count ok'; countEl.textContent=t('photoCountOk')+' ('+n+')'; }
}

function checkStep2Btn(){
  var hasparts = Object.keys(selectedParts).length > 0;
  document.getElementById('btnStep2').disabled = !hasparts;
}

// drag & drop
document.addEventListener('DOMContentLoaded', function(){
  var area = document.getElementById('photoDropArea');
  if(!area) return;
  area.addEventListener('dragover', function(e){ e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', function(){ area.classList.remove('dragover'); });
  area.addEventListener('drop', function(e){ e.preventDefault(); area.classList.remove('dragover'); handlePhotos(e.dataTransfer.files); });
});

// ============================================================
//  TELEGRAM MAIN BUTTON & BACK BUTTON
// ============================================================
function setupTgButtons(step){
  if(!tg) return;

  // BackButton
  if(step > 1){
    tg.BackButton.show();
    tg.BackButton.onClick(function(){
      if(step === 2) goStep1();
      else if(step === 3) goStep2();
    });
  } else {
    tg.BackButton.hide();
  }

  // MainButton
  tg.MainButton.setParams({
    color: tg.themeParams.button_color || '#e8b84b',
    text_color: tg.themeParams.button_text_color || '#000000'
  });

  if(step === 1){
    tg.MainButton.setText(t('confirm').replace('ПОДТВЕРДИТЬ ','').replace('AVTOMOBILNI ','').replace('确认',''));
    tg.MainButton.setText(t('confirm'));
    tg.MainButton.onClick(goStep2);
    tg.MainButton.disable();
    tg.MainButton.show();
  } else if(step === 2){
    tg.MainButton.setText(t('next'));
    tg.MainButton.onClick(goStep3);
    var hasParts = Object.keys(selectedParts).length > 0;
    hasParts ? tg.MainButton.enable() : tg.MainButton.disable();
    tg.MainButton.show();
  } else if(step === 3){
    tg.MainButton.setText(t('submit'));
    tg.MainButton.onClick(submitOrder);
    tg.MainButton.disable();
    tg.MainButton.show();
  } else if(step === 4){
    tg.MainButton.setText('✓ OK');
    tg.MainButton.onClick(function(){ tg.close(); });
    tg.MainButton.enable();
    tg.BackButton.hide();
    tg.MainButton.show();
  }
}

var bannerIdx = 0;
var bannerTimer = null;

function renderBanners(){
  var track = document.getElementById('bannerTrack');
  var dots  = document.getElementById('bannerDots');
  if(!track) return;
  track.innerHTML = '';
  dots.innerHTML  = '';

  BANNERS.forEach(function(b, i){
    var slide = document.createElement('div');
    slide.className = 'banner-slide tag-'+b.tag;
    slide.innerHTML =
      '<div class="banner-top">' +
        '<div class="banner-icon">'+b.icon+'</div>' +
        '<div class="banner-tag '+b.tag+'">' + b.tag.toUpperCase() + '</div>' +
        '<button class="banner-close" onclick="closeBanners()" title="Close">×</button>' +
      '</div>' +
      '<div class="banner-body">' +
        '<div class="banner-title">'+(b.title[currentLang]||b.title.ru)+'</div>' +
        '<div class="banner-desc">' +(b.desc[currentLang] ||b.desc.ru) +'</div>' +
      '</div>';
    track.appendChild(slide);

    var dot = document.createElement('div');
    dot.className = 'banner-dot' + (i===0?' active':'');
    dot.onclick = (function(idx){ return function(){ goBanner(idx); }; })(i);
    dots.appendChild(dot);
  });

  // Wait for layout to settle before positioning
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      goBanner(0);
      startBannerAuto();
      addBannerSwipe();
    });
  });
}

function goBanner(idx){
  bannerIdx = (idx + BANNERS.length) % BANNERS.length;
  var track = document.getElementById('bannerTrack');
  var strip = document.getElementById('bannerStrip');
  if(!track || !strip) return;
  // Use strip's actual rendered width to compute pixel offset
  // This avoids % issues when strip has padding
  var slideW = strip.clientWidth;
  track.style.transform = 'translateX(-'+(bannerIdx * slideW)+'px)';
  document.querySelectorAll('.banner-dot').forEach(function(d,i){
    d.classList.toggle('active', i===bannerIdx);
  });
}

// Recalculate on resize (orientation change etc.)
window.addEventListener('resize', function(){
  goBanner(bannerIdx);
});

function startBannerAuto(){
  if(bannerTimer) clearInterval(bannerTimer);
  if(BANNERS.length > 1){
    bannerTimer = setInterval(function(){ goBanner(bannerIdx+1); }, 5000);
  }
}

function closeBanners(){
  clearInterval(bannerTimer);
  var strip = document.getElementById('bannerStrip');
  strip.style.height = strip.offsetHeight+'px';
  strip.style.overflow = 'hidden';
  strip.style.transition = 'height .3s ease, opacity .3s ease';
  requestAnimationFrame(function(){
    strip.style.height = '0'; strip.style.opacity = '0';
    setTimeout(function(){ strip.style.display='none'; }, 310);
  });
}

function addBannerSwipe(){
  var track = document.getElementById('bannerTrack');
  var startX = 0;
  track.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; clearInterval(bannerTimer); }, {passive:true});
  track.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - startX;
    var strip = document.getElementById('bannerStrip');
    var threshold = strip ? strip.clientWidth * 0.2 : 60;
    if(Math.abs(dx) > threshold) goBanner(bannerIdx + (dx < 0 ? 1 : -1));
    startBannerAuto();
  }, {passive:true});
  // Mouse drag for desktop
  var dragging = false, dragStartX = 0;
  track.addEventListener('mousedown', function(e){ dragging=true; dragStartX=e.clientX; clearInterval(bannerTimer); e.preventDefault(); });
  window.addEventListener('mouseup', function(e){
    if(!dragging) return; dragging=false;
    var dx = e.clientX - dragStartX;
    if(Math.abs(dx) > 60) goBanner(bannerIdx + (dx < 0 ? 1 : -1));
    startBannerAuto();
  });
}
